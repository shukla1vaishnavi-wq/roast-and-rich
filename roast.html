<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Roast&Rich — Money Roast</title>
<link rel="stylesheet" href="style.css"/>
<style>
.wrap{max-width:820px;margin:0 auto;padding:84px 40px 60px}
.spend-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.roast-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.roast-output{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.roast-section{border-radius:var(--radius-sm);padding:16px 20px}
.rs-label{font-size:.7rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px}
.rs-body{font-size:.93rem;line-height:1.75;color:var(--text)}
.roast-bullet{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;font-size:.9rem;line-height:1.6}
.roast-bullet::before{content:'→';opacity:.65;flex-shrink:0;margin-top:1px}
.roast-fire   {background:rgba(255,32,112,.07);border:1.5px solid var(--pink)}
.roast-fire   .rs-label{color:var(--pink)}
.roast-reality{background:rgba(255,204,0,.06);border:1.5px solid var(--warn)}
.roast-reality .rs-label{color:var(--warn)}
.roast-fix    {background:rgba(170,238,34,.06);border:1.5px solid var(--green)}
.roast-fix    .rs-label{color:var(--green)}
.roast-win    {background:rgba(0,230,118,.06);border:1.5px solid var(--success)}
.roast-win    .rs-label{color:var(--success)}
@media(max-width:640px){.spend-grid{grid-template-columns:1fr}.wrap{padding:80px 16px 60px}}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="loader-logo"><span class="g">Roast</span><span class="p">&</span><span class="g">Rich</span></div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-tagline">Preparing the roast... 💀</div>
</div>
<nav class="navbar">
  <div class="inner">
    <a href="index.html" class="nav-logo"><span class="g">Roast</span><span class="p">&</span><span class="g">Rich</span></a>
    <div class="nav-links">
      <button class="nav-link" onclick="location.href='dashboard.html'">Dashboard</button>
      <button class="nav-link active">Roast</button>
      <button class="nav-link" onclick="location.href='fomo.html'">FOMO</button>
      <button class="nav-link" onclick="location.href='wealth.html'">Wealth</button>
      <button class="nav-link" onclick="location.href='budget.html'">Budget</button>
      <button class="nav-link" onclick="location.href='goals.html'">Goals</button>
      <button class="nav-link" onclick="location.href='tracker.html'">Tracker</button>
      <button class="nav-link" onclick="location.href='mood.html'">Mood</button>
      <button class="nav-link" onclick="location.href='rewards.html'">Rewards</button>
      <button class="nav-link" onclick="location.href='chat.html'">AI Chat</button>
      <button class="nav-link" onclick="location.href='blog.html'">Blog</button>
      <button class="nav-link" onclick="location.href='vision.html'">Vision</button>
      <button class="nav-link" onclick="location.href='mission.html'">Mission</button>
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost btn-sm" id="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
      <button class="btn btn-ghost btn-sm" onclick="location.href='settings.html'">⚙️</button>
      <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="wrap">
  <div class="page-header-inner">
    <button class="back-btn" onclick="location.href='dashboard.html'">←</button>
    <h1 class="display d-md">Money Roast 🔥</h1>
  </div>
  <p class="body-md mb-16">Enter this month's actual spending. Every category changes the roast.</p>
  <div class="spend-grid">
    <div class="form-group"><label>🍔 Food & delivery apps (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-food"   class="form-control" value="3000" min="0" step="100" oninput="updateM()"/></div></div>
    <div class="form-group"><label>🚇 Transport / Uber / Metro (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-travel" class="form-control" value="1200" min="0" step="100" oninput="updateM()"/></div></div>
    <div class="form-group"><label>🛍️ Shopping & clothes (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-shop"   class="form-control" value="1500" min="0" step="100" oninput="updateM()"/></div></div>
    <div class="form-group"><label>🏠 Rent / PG / Hostel (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-rent"   class="form-control" value="4000" min="0" step="200" oninput="updateM()"/></div></div>
    <div class="form-group"><label>💄 Personal care / grooming (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-groom"  class="form-control" value="500"  min="0" step="100" oninput="updateM()"/></div></div>
    <div class="form-group"><label>🎬 OTT / outings / concerts (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-ent"    class="form-control" value="800"  min="0" step="100" oninput="updateM()"/></div></div>
    <div class="form-group"><label>🎲 Misc / impulse buys (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-misc"   class="form-control" value="700"  min="0" step="100" oninput="updateM()"/></div></div>
    <div class="form-group"><label>📈 SIP / savings this month (₹)</label><div class="input-wrap"><span class="input-prefix">₹</span><input type="number" id="r-invest" class="form-control" value="500"  min="0" step="100" oninput="updateM()"/></div></div>
  </div>
  <div class="roast-metrics" id="roast-metrics"></div>
  <button class="btn btn-pink btn-full" id="roast-btn" onclick="doRoast()">🔥 Roast me!</button>
  <div class="roast-output hidden" id="roast-output"></div>
  <div class="chart-wrap"><canvas id="roast-chart" class="hidden" style="max-height:260px"></canvas></div>
</div>
<script src="app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let rChart=null;
function getS(){ return{food:val('r-food'),travel:val('r-travel'),shop:val('r-shop'),rent:val('r-rent'),groom:val('r-groom'),ent:val('r-ent'),misc:val('r-misc'),invest:val('r-invest')}; }
function updateM(){
  const s=getS(),total=s.food+s.travel+s.shop+s.rent+s.groom+s.ent+s.misc;
  const p=RR.profile,rem=(p?p.income:0)-total-s.invest;
  document.getElementById('roast-metrics').innerHTML=`
    <div class="metric-card"><div class="metric-val">${fmt(total)}</div><div class="metric-lbl">Total spent</div></div>
    <div class="metric-card"><div class="metric-val">${fmt(s.invest)}</div><div class="metric-lbl">Saved / invested</div></div>
    <div class="metric-card"><div class="metric-val ${rem<0?'pink':''}">${fmt(rem)}</div><div class="metric-lbl">Remaining</div></div>`;
}

async function doRoast(){
  if(!requireProfile()) return;
  const p=RR.profile, s=getS();
  const total=s.food+s.travel+s.shop+s.rent+s.groom+s.ent+s.misc;
  const btn=document.getElementById('roast-btn');
  btn.disabled=true; btn.textContent='Roasting... 💀';

  let result;

  if (RR.apiKey) {
    /* Real AI — structured prompt */
    const pr=pronoun(p);
    const gInstr=p.gender==='female'?`Address as "${pr}" (female). Never "bhai".`:p.gender==='male'?`Address as "${pr}" (male). Never "behen/yaar".`:`Use neutral "${pr}".`;
    const raw=await callAI(`${profileStr()}
${gInstr}
This month's ACTUAL spend:
Food: ₹${s.food} | Travel: ₹${s.travel} | Shopping: ₹${s.shop} | Rent: ₹${s.rent} | Grooming: ₹${s.groom} | Entertainment: ₹${s.ent} | Misc: ₹${s.misc} | Total: ₹${total} | Invested: ₹${s.invest}

RULES:
- Roast ONLY based on actual numbers above
- If food=0, do NOT mention Food & delivery apps
- If invest > 30% of income, give positive/encouraging roast
- If total=0, ask for real numbers
- Be BRUTAL and FUNNY — this is the USP of the app
- Do NOT give generic finance advice (no "Investment 101", no "emergency fund concepts")

Format with these exact headers on their own lines:
🔥 THE ROAST
[brutal, funny, specific to their highest spend]
😬 REALITY CHECK
[what happens in 6 months at this rate, with numbers]
✅ THE FIX
• [specific cut with ₹ amount]
• [specific cut with ₹ amount]
• [specific cut with ₹ amount]
• [specific cut with ₹ amount]
🏆 WIN THIS MONTH
[one genuine positive]`,500);
    /* Parse raw AI text into sections */
    result = parseAIRoast(raw);
  } else {
    /* Mock roast engine — always relevant */
    result = roastEngine(s, p);
  }

  btn.disabled=false; btn.textContent='🔥 Roast me again!';
  const out=document.getElementById('roast-output');
  out.classList.remove('hidden');
  out.innerHTML=formatRoast(result);

  /* Chart */
  if(total>0||s.invest>0){
    const canvas=document.getElementById('roast-chart');
    canvas.classList.remove('hidden');
    const labels=['Food','Travel','Shopping','Rent','Grooming','Ent','Misc','Savings'];
    const data=[s.food,s.travel,s.shop,s.rent,s.groom,s.ent,s.misc,s.invest];
    const cols=['#ff2070','#aaee22','#00e5ff','#ffd600','#ff6b35','#b44aff','#ff4444','#00e676'];
    const isDark=!document.body.classList.contains('light');
    if(rChart) rChart.destroy();
    rChart=new Chart(canvas,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:cols,borderWidth:2,borderColor:isDark?'#080808':'#f6f6f2'}]},
      options:{plugins:{legend:{position:'bottom',labels:{color:isDark?'#666':'#aaa',font:{size:11},boxWidth:12}}},cutout:'56%'}});
  }
}

/* Parse raw AI text into roastEngine-compatible object */
function parseAIRoast(raw) {
  const roastM   = raw.match(/🔥\s*THE ROAST\s*\n([\s\S]*?)(?=😬|$)/i);
  const realityM = raw.match(/😬\s*REALITY CHECK\s*\n([\s\S]*?)(?=✅|$)/i);
  const fixM     = raw.match(/✅\s*THE FIX\s*\n([\s\S]*?)(?=🏆|$)/i);
  const winM     = raw.match(/🏆\s*WIN[^\n]*\n([\s\S]*?)$/i);

  if (!roastM) return raw; /* fallback to string */

  const fixText = fixM ? fixM[1].trim() : '';
  const fixes   = fixText.split('\n').map(l=>l.replace(/^[•\-*]\s*/,'')).filter(l=>l.trim().length>5);

  return {
    roast:   (roastM  ?roastM[1] :raw).trim(),
    reality: (realityM?realityM[1]:'').trim(),
    fixes:   fixes.length ? fixes : ['Review your biggest category','Set a weekly spending limit','Start or increase your SIP'],
    win:     (winM?winM[1]:'').trim()||'You tracked — that\'s step one.',
  };
}

document.addEventListener('DOMContentLoaded',()=>{ requireProfile(); updateM(); });
</script>
</body>
</html>
