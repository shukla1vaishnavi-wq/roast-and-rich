<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Roast&Rich — Login</title>
<link rel="stylesheet" href="style.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;box-shadow:var(--shadow)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .brand{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-.02em}
.auth-logo .tagline{font-size:.85rem;color:var(--text3);margin-top:4px;font-style:italic}
.auth-tabs{display:flex;background:var(--surf2);border-radius:var(--radius-sm);padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;padding:.5rem;text-align:center;border:none;background:transparent;font-size:.88rem;font-weight:600;color:var(--text3);border-radius:var(--radius-xs);cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.divider-or{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:.82rem}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;padding:.7rem;background:var(--surf2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;gap:10px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text);font-family:'Instrument Sans',sans-serif}
.google-btn:hover{border-color:var(--border3);background:var(--surf3)}
.google-svg{width:18px;height:18px}
.error-msg{background:rgba(255,68,68,.1);border:1px solid var(--danger);border-radius:var(--radius-xs);padding:10px 14px;font-size:.82rem;color:var(--danger);margin-top:10px;display:none}
.success-msg{background:rgba(0,230,118,.08);border:1px solid var(--success);border-radius:var(--radius-xs);padding:10px 14px;font-size:.82rem;color:var(--success);margin-top:10px;display:none}
.firebase-notice{background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:.8rem;color:var(--text3);margin-bottom:20px;line-height:1.6}
.firebase-notice strong{color:var(--text2)}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="loader-logo"><span class="g">Roast</span><span class="p">&</span><span class="g">Rich</span></div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-tagline">Loading...</div>
</div>

<div class="auth-card anim-fade-up">
  <div class="auth-logo">
    <div class="brand"><span style="color:var(--green)">Roast</span><span style="color:var(--pink)">&</span><span style="color:var(--green)">Rich</span></div>
    <div class="tagline">Roast first. Rich later.</div>
  </div>

  <!-- Firebase notice (shown if not configured) -->
  <div class="firebase-notice" id="fb-notice" style="display:none">
    <strong>Demo Mode</strong> — Data saves locally on this device.<br/>
    To sync across devices, add Firebase config in <code>firebase-config.js</code>.<br/>
    <a href="https://console.firebase.google.com" target="_blank" style="color:var(--green)">Set up Firebase free →</a>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Log In</button>
    <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- Login form -->
  <div id="form-login">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="login-email" class="form-control" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" class="form-control" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-green btn-full mt-8" onclick="doLogin()" id="login-btn">Log In →</button>

    <div class="divider-or">or</div>
    <button class="google-btn" onclick="doGoogle()">
      <svg class="google-svg" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider-or">or</div>
    <button class="btn btn-ghost btn-full" onclick="demoLogin()">
      👀 Try Demo (no login needed)
    </button>

    <div class="error-msg"   id="login-err"></div>
    <div class="success-msg" id="login-ok"></div>
  </div>

  <!-- Signup form -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Your name</label>
      <input type="text" id="signup-name" class="form-control" placeholder="e.g. Priya" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signup-email" class="form-control" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password <span style="color:var(--text3);font-weight:400">(min 6 characters)</span></label>
      <input type="password" id="signup-pass" class="form-control" placeholder="••••••••" autocomplete="new-password"
             onkeydown="if(event.key==='Enter')doSignup()"/>
    </div>
    <button class="btn btn-pink btn-full mt-8" onclick="doSignup()" id="signup-btn">Create Account →</button>

    <div class="divider-or">or</div>
    <button class="google-btn" onclick="doGoogle()">
      <svg class="google-svg" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>

    <div class="error-msg"   id="signup-err"></div>
    <div class="success-msg" id="signup-ok"></div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display  = tab==='login'  ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',  tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 5000);
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function setBtnLoading(id, loading) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait...' : (id==='login-btn' ? 'Log In →' : 'Create Account →');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { showErr('login-err','Please fill in both fields.'); return; }
  setBtnLoading('login-btn', true);
  const res = await db.signInEmail(email, pass);
  setBtnLoading('login-btn', false);
  if (res.error) { showErr('login-err', res.error); return; }
  RR.loggedIn = true;
  if (res.name) { const p=RR.profile; if(p){p.name=res.name; RR.profile=p;} }
  window.location.href = RR.profile ? 'dashboard.html' : 'onboarding.html';
}

async function doSignup() {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-pass').value;
  if (!name)          { showErr('signup-err','Please enter your name.'); return; }
  if (!email)         { showErr('signup-err','Please enter your email.'); return; }
  if (pass.length<6)  { showErr('signup-err','Password must be at least 6 characters.'); return; }
  setBtnLoading('signup-btn', true);
  const res = await db.signUp(email, pass, name);
  setBtnLoading('signup-btn', false);
  if (res.error) { showErr('signup-err', res.error); return; }
  RR.loggedIn = true;
  showOk('signup-ok', `Welcome, ${name}! Setting up your profile...`);
  setTimeout(()=>window.location.href='onboarding.html', 1200);
}

async function doGoogle() {
  const res = await db.signInGoogle();
  if (res.error) { showErr('login-err', res.error || 'Google sign-in failed.'); return; }
  RR.loggedIn = true;
  if (res.name) {
    const p = RR.profile;
    if (p) { p.name = res.name; RR.profile = p; }
  }
  window.location.href = RR.profile ? 'dashboard.html' : 'onboarding.html';
}

function demoLogin() {
  const res = db._localSignUp('Demo User', 'demo@roastandrich.app');
  RR.loggedIn = true;
  window.location.href = RR.profile ? 'dashboard.html' : 'onboarding.html';
}

document.addEventListener('DOMContentLoaded', async () => {
  /* If already logged in → skip auth page */
  if (RR.loggedIn && RR.profile) {
    window.location.href = 'dashboard.html';
    return;
  }
  /* Init Firebase */
  await db.init();
  if (!db.isFirebase) {
    document.getElementById('fb-notice').style.display = 'block';
  }
});
</script>
</body>
</html>
