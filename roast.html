<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Roast&Rich — Money Roast</title>
<link rel="stylesheet" href="style.css"/>
<style>
.wrap{max-width:820px;margin:0 auto;padding:76px 40px 60px}
.spend-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.roast-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
@media(max-width:640px){.spend-grid{grid-template-columns:1fr}.wrap{padding:72px 14px 60px}}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="loader-logo"><span class="g">Roast</span><span class="p">&</span><span class="g">Rich</span></div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-tagline">Preparing the roast...</div>
</div>

<nav class="navbar" id="universal-navbar"></nav>

<div class="wrap">
  <div class="page-header-inner">
    <button class="back-btn" onclick="location.href='dashboard.html'">←</button>
    <h1 class="display d-md">Money Roast</h1>
  </div>
  <p class="body-md mb-16">Enter this month's actual spending. Every number changes the response.</p>

  <div class="spend-grid">
    <div class="form-group">
      <label>Food &amp; delivery (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-food" class="form-control" value="3000" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>Transport &amp; commute (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-travel" class="form-control" value="1200" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>Shopping &amp; clothes (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-shop" class="form-control" value="1500" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>Rent / PG / Hostel (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-rent" class="form-control" value="4000" min="0" step="200" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>Personal care &amp; grooming (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-groom" class="form-control" value="500" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>Entertainment &amp; outings (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-ent" class="form-control" value="800" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>Misc / impulse buys (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-misc" class="form-control" value="700" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
    <div class="form-group">
      <label>SIP / savings this month (₹)</label>
      <div class="input-wrap"><span class="input-prefix">₹</span>
        <input type="number" id="r-invest" class="form-control" value="500" min="0" step="100" oninput="updateM()"/>
      </div>
    </div>
  </div>

  <div class="roast-metrics" id="roast-metrics"></div>

  <button class="btn btn-pink btn-full" id="roast-btn" onclick="doRoast()">Roast me!</button>

  <div class="roast-output hidden" id="roast-output"></div>

  <div class="chart-wrap"><canvas id="roast-chart" class="hidden" style="max-height:260px"></canvas></div>
</div>

<script src="app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var rChart = null;

function getS(){
  return {
    food:   val('r-food'),
    travel: val('r-travel'),
    shop:   val('r-shop'),
    rent:   val('r-rent'),
    groom:  val('r-groom'),
    ent:    val('r-ent'),
    misc:   val('r-misc'),
    invest: val('r-invest')
  };
}

function updateM(){
  var s=getS();
  var total=s.food+s.travel+s.shop+s.rent+s.groom+s.ent+s.misc;
  var p=RR.profile;
  var rem=(p?p.income:0)-total-s.invest;
  document.getElementById('roast-metrics').innerHTML=
    '<div class="metric-card"><div class="metric-val">'+fmt(total)+'</div><div class="metric-lbl">Total spent</div></div>'+
    '<div class="metric-card"><div class="metric-val">'+fmt(s.invest)+'</div><div class="metric-lbl">Saved / invested</div></div>'+
    '<div class="metric-card"><div class="metric-val '+(rem<0?'pink':'')+'">'+fmt(rem)+'</div><div class="metric-lbl">Remaining</div></div>';
}

async function doRoast(){
  if(!requireProfile()) return;
  var p=RR.profile, s=getS();
  var total=s.food+s.travel+s.shop+s.rent+s.groom+s.ent+s.misc;

  var btn=document.getElementById('roast-btn');
  btn.disabled=true; btn.textContent='Roasting...';

  var result;

  if(RR.apiKey){
    // Real AI
    var prompt=profileStr()+'\n\n'+
      'This month\'s ACTUAL spending:\n'+
      'Food: '+fmt(s.food)+' | Transport: '+fmt(s.travel)+' | Shopping: '+fmt(s.shop)+
      ' | Rent: '+fmt(s.rent)+' | Grooming: '+fmt(s.groom)+' | Entertainment: '+fmt(s.ent)+
      ' | Misc: '+fmt(s.misc)+' | Total: '+fmt(total)+' | Invested: '+fmt(s.invest)+'\n\n'+
      'RULES:\n'+
      '- Base your response ONLY on the actual numbers above\n'+
      '- If food is 0, do NOT mention food delivery\n'+
      '- If invested > 30% of income, give encouraging roast\n'+
      '- Write in clear English only — no Hindi words\n'+
      '- Do not mention any specific app names\n'+
      '- Be honest, direct, and occasionally humorous\n\n'+
      'Format with these exact section headers on their own lines:\n'+
      'THE ROAST\n[2-3 lines — specific to highest spend category]\n\n'+
      'REALITY CHECK\n[2 lines — what happens in 6 months at this rate]\n\n'+
      'THE FIX\n• [specific action with rupee amount]\n• [specific action]\n• [specific action]\n• [specific action]\n\n'+
      'WIN THIS MONTH\n[1 line — one genuine positive]';

    var raw=await callAI(prompt,500);
    result=parseRoastText(raw);
  } else {
    // Mock roast engine
    result=roastEngine(s,p);
  }

  btn.disabled=false; btn.textContent='Roast me again!';

  var out=document.getElementById('roast-output');
  out.classList.remove('hidden');
  out.innerHTML=formatRoast(result);

  // Chart
  if(total>0||s.invest>0){
    var canvas=document.getElementById('roast-chart');
    canvas.classList.remove('hidden');
    var labels=['Food','Transport','Shopping','Rent','Grooming','Entertainment','Misc','Savings'];
    var data=[s.food,s.travel,s.shop,s.rent,s.groom,s.ent,s.misc,s.invest];
    var cols=['#ff2070','#aaee22','#00e5ff','#ffd600','#ff6b35','#b44aff','#ff4444','#00e676'];
    var isDark=!document.body.classList.contains('light');
    if(rChart) rChart.destroy();
    rChart=new Chart(canvas,{
      type:'doughnut',
      data:{labels:labels,datasets:[{data:data,backgroundColor:cols,borderWidth:2,borderColor:isDark?'#080808':'#f6f6f2'}]},
      options:{plugins:{legend:{position:'bottom',labels:{color:isDark?'#666':'#aaa',font:{size:11},boxWidth:12}}},cutout:'56%'}
    });
  }
}

function parseRoastText(raw){
  var roastM   = raw.match(/THE ROAST\s*\n([\s\S]*?)(?=REALITY CHECK|$)/i);
  var realityM = raw.match(/REALITY CHECK\s*\n([\s\S]*?)(?=THE FIX|$)/i);
  var fixM     = raw.match(/THE FIX\s*\n([\s\S]*?)(?=WIN THIS MONTH|$)/i);
  var winM     = raw.match(/WIN THIS MONTH\s*\n([\s\S]*?)$/i);

  if(!roastM) return raw;

  var fixText = fixM ? fixM[1].trim() : '';
  var fixes   = fixText.split('\n').map(function(l){return l.replace(/^[•\-*]\s*/,'').trim();}).filter(function(l){return l.length>5;});

  return {
    roast:   (roastM   ? roastM[1]   : raw).trim(),
    reality: (realityM ? realityM[1] : '').trim(),
    fixes:   fixes.length ? fixes : ['Review your biggest expense category this month','Set a weekly spending limit per category','Start or increase your monthly investment'],
    win:     (winM ? winM[1] : '').trim() || 'You tracked your spending — that awareness is the first step.',
  };
}

document.addEventListener('DOMContentLoaded', function(){
  requireProfile();
  injectNavbar('roast');
  updateM();
});
</script>
</body>
</html>
